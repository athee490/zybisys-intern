<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStudent | Student Management Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <h1>ProStudent</h1>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="globalSearch" placeholder="Search students...">
                    </div>
                    <button class="btn-primary" onclick="openModal('addStudentModal')">
                        <i class="fas fa-plus"></i> Add Student
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Total Students</span>
                    <h3 id="totalStudents">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-building"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Departments</span>
                    <h3 id="totalDepts">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-birthday-cake"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Average Age</span>
                    <h3 id="avgAge">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Recent Adds</span>
                    <h3 id="recentAdds">0</h3>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Filters -->
            <div class="filters-section">
                <div class="filter-group">
                    <select id="filterDept" onchange="applyFilters()">
                        <option value="">All Departments</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="IT">IT</option>
                        <option value="MECH">MECH</option>
                    </select>
                    <select id="sortBy" onchange="applyFilters()">
                        <option value="newest">Newest First</option>
                        <option value="nameAsc">Name (A-Z)</option>
                        <option value="nameDesc">Name (Z-A)</option>
                        <option value="ageAsc">Age (Low-High)</option>
                    </select>
                </div>
                <div class="action-buttons">
                    <button class="btn-outline" onclick="exportData()">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="btn-outline" onclick="toggleDarkMode()">
                        <i class="fas fa-moon"></i> Dark Mode
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Age</th>
                            <th>Department</th>
                            <th>Email</th>
                            <th>Date Added</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsList">
                        <!-- Students will be rendered here -->
                    </tbody>
                </table>
                <div class="no-data" id="noData" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p>No students found. Add your first student to get started!</p>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <span id="paginationInfo">Showing 0 students</span>
                <div class="pagination-controls">
                    <button class="btn-icon" onclick="previousPage()"><i class="fas fa-chevron-left"></i></button>
                    <span id="pageNumber">1</span>
                    <button class="btn-icon" onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Student Modal -->
    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <span class="close-btn" onclick="closeModal('addStudentModal')">&times;</span>
            </div>
            <form id="studentForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="form-group">
                    <label for="studentName">Full Name *</label>
                    <input type="text" id="studentName" required placeholder="Enter student name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="studentAge">Age *</label>
                        <input type="number" id="studentAge" required min="16" max="100" placeholder="Age">
                    </div>
                    <div class="form-group">
                        <label for="studentDept">Department *</label>
                        <select id="studentDept" required>
                            <option value="">Select Department</option>
                            <option value="CSE">Computer Science (CSE)</option>
                            <option value="ECE">Electronics (ECE)</option>
                            <option value="EEE">Electrical (EEE)</option>
                            <option value="IT">Information Tech (IT)</option>
                            <option value="MECH">Mechanical (MECH)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="studentEmail">Email Address *</label>
                    <input type="email" id="studentEmail" required placeholder="student@example.com">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-outline" onclick="closeModal('addStudentModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Student Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Student Profile</h2>
                <span class="close-btn" onclick="closeModal('viewModal')">&times;</span>
            </div>
            <div id="viewContent" class="view-content">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
