<!doctype html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Blogr</title>


<style>

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 background:#fafafa;
}


/* ================= HERO ================= */

.hero{

height:335px;

background:linear-gradient(
135deg,
#ff9075,
#ff3855
);

color:white;

border-bottom-left-radius:70px;

position:relative;

}



.navbar{

height:90px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 90px;

}



.logo{

font-size:28px;
font-weight:bold;

}



.nav-links{

display:flex;

gap:35px;

list-style:none;

font-size:13px;

}



.auth{

display:flex;
gap:25px;
align-items:center;

}



.login-btn{

background:none;
border:none;
color:white;
cursor:pointer;

}



.signup-btn{

background:white;

color:#ff3855;

border:0;

padding:12px 28px;

border-radius:30px;

font-weight:bold;

}



.hamburger{

display:none;

font-size:26px;

background:none;

border:0;

color:white;

cursor:pointer;

}



.mobile-menu{

display:none;

position:absolute;

right:20px;

top:70px;

background:white;

color:#333;

width:200px;

padding:20px;

border-radius:15px;

z-index:20;

box-shadow:0 10px 30px #0003;

}



.mobile-menu div{

padding:12px 5px;

cursor:pointer;

}



.mobile-menu.show{

display:block;

}





.hero-content{

text-align:center;

margin-top:45px;

}



.hero-content h1{

font-size:45px;

}



.hero-content p{

margin-top:15px;

}



.hero-buttons{

margin-top:30px;

}



.primary-btn{

background:white;

color:#ff3855;

border:0;

padding:12px 22px;

border-radius:30px;

}



.secondary-btn{

background:transparent;

border:1px solid white;

color:white;

padding:12px 22px;

border-radius:30px;

}





/* ================= CONTENT ================= */


.future{

padding:80px;

}



.future h2{

text-align:center;

margin-bottom:80px;

color:#34495e;

}



.grid{

display:grid;

grid-template-columns:1fr 1fr;

align-items:center;

gap:50px;

}



.grid img{

width:100%;

}



h3{

margin:30px 0 15px;

color:#34495e;

}



p{

line-height:1.7;

color:#777;

}






.infra{


background:#3f4164;

color:white;

padding:70px;

border-radius:0 0 100px 0;


display:grid;

grid-template-columns:1fr 1fr;

align-items:center;


}



.phones{

display:flex;

align-items:end;

justify-content:center;

}



.phone1{

width:230px;

}



.phone2{

width:200px;

margin-left:-30px;

}





.tools{

padding:90px;

display:grid;

grid-template-columns:1fr 1fr;

align-items:center;

gap:50px;

}



.tools img{

width:100%;

}





.footer{


background:#25252d;

color:white;

padding:70px;


display:grid;

grid-template-columns:repeat(4,1fr);


border-radius:80px 0 0 0;

}



.footer p{

color:#ccc;

}





/* ================= CONTACT MODAL ================= */


.overlay{


position:fixed;

top:0;

left:0;

width:100%;

height:100%;


background:#0007;


display:flex;

justify-content:center;

align-items:center;


z-index:100;



}



.contact{


background:white;

width:700px;

padding:40px;

border-radius:20px;

position:relative;


}



.close{

position:absolute;

right:20px;

top:15px;

border:0;

background:none;

font-size:25px;

cursor:pointer;

}



.row{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



label{

display:block;

margin-top:20px;

color:#444;

}



input,
textarea{

width:100%;

padding:14px;

border:1px solid #9aa;

border-radius:8px;

}



.radio{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



.radio div{


border:1px solid #aaa;

padding:15px;

border-radius:8px;

}



.check{

margin-top:20px;

}



.submit{

margin-top:30px;

width:100%;

background:#087f6c;

color:white;

border:0;

padding:15px;

border-radius:8px;

font-weight:bold;

}




/* ================= MOBILE ================= */


@media(max-width:768px){


.nav-links,
.auth{

display:none;

}



.hamburger{

display:block;

}



.navbar{

padding:0 20px;

}



.hero-content h1{

font-size:32px;

}



.future,
.tools,
.infra{

padding:45px 25px;

}



.grid,
.infra,
.tools,
.footer,
.row,
.radio{

grid-template-columns:1fr;

}



.phones{

margin-bottom:30px;

}



.footer{

gap:30px;

}



.contact{

width:90%;

padding:25px;

}



}


</style>


</head>


<body>


<div id="root"></div>


<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


<script type="text/babel">


function Contact({close}){


return (

<div className="overlay">


<form className="contact"
onSubmit={(e)=>{

e.preventDefault();

close();

}}>


<button
className="close"
type="button"
onClick={close}
>

×
</button>


<h1>Contact Us</h1>



<div className="row">


<div>

<label>First Name *</label>

<input/>


</div>


<div>

<label>Last Name *</label>

<input/>


</div>


</div>




<label>Email Address *</label>

<input/>




<label>Query Type *</label>


<div className="radio">


<div>
<input type="radio"/>
 General Enquiry
</div>


<div>
<input type="radio"/>
 Support Request
</div>


</div>




<label>Message *</label>

<textarea rows="5"></textarea>




<div className="check">

<input type="checkbox"/>

 I consent to being contacted by the team *

</div>




<button className="submit">

Submit

</button>


</form>


</div>


)

}





function App(){


const [modal,setModal]=React.useState(false);

const [menu,setMenu]=React.useState(false);



return (

<>


<section className="hero">


<nav className="navbar">


<h2 className="logo">

Blogr

</h2>


<ul className="nav-links">

<li>Product</li>
<li>Company</li>
<li>Connect</li>

</ul>



<div className="auth">


<button
className="login-btn"
onClick={()=>setModal(true)}
>

Login

</button>


<button className="signup-btn">

Sign Up

</button>


</div>




<button
className="hamburger"
onClick={()=>setMenu(!menu)}
>

☰

</button>



<div className={menu?"mobile-menu show":"mobile-menu"}>


<div>Product</div>

<div>Company</div>

<div>Connect</div>


<hr/>


<div onClick={()=>setModal(true)}>
Login
</div>


<div>
Sign Up
</div>


</div>



</nav>



<div className="hero-content">


<h1>
A modern publishing platform
</h1>


<p>
Grow your audience and build your online brand
</p>


<div className="hero-buttons">

<button className="primary-btn">
Start for Free
</button>


<button className="secondary-btn">
Learn More
</button>


</div>


</div>


</section>





<section className="future">


<h2>
Designed for the future
</h2>


<div className="grid">


<div>


<h3>
Introducing an extensible editor
</h3>


<p>
Blogr features an intuitive interface which lets you focus on creating content.
</p>



<h3>
Robust content management
</h3>


<p>
Flexible content management enables users to easily move through posts.
</p>



</div>



<img src="./images/editor.png"/>


</div>


</section>







<section className="infra">


<div className="phones">


<img className="phone1"
src="./images/phone.png"/>


<img className="phone2"
src="./images/phone2.png"/>


</div>



<div>


<h2>
State of the Art Infrastructure
</h2>


<p>
Worldwide data centers provide ultra fast connectivity.
</p>


</div>


</section>







<section className="tools">


<img src="./images/laptop.png"/>



<div>


<h2>
Free, open, simple
</h2>


<p>
Powerful tooling included.
</p>


</div>



</section>







<footer className="footer">


<div>
<h2>Blogr</h2>
</div>


<div>

<h4>Product</h4>

<p>Overview</p>
<p>Pricing</p>

</div>


<div>

<h4>Company</h4>

<p>About</p>
<p>Team</p>

</div>



<div>

<h4>Connect</h4>

<p>Contact</p>

</div>



</footer>





{
modal &&
<Contact close={()=>setModal(false)}/>
}



</>

)


}



ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>);


</script>


</body>
</html>
